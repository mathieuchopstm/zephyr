include: sensor-device.yaml

properties:
  io-channels:
    required: true
    description: ADC channel for temperature sensor

  ntc:
    type: boolean
    description: |
      Negative Temperature Coefficient - sensor value decreases as Tjunction increases.

      This is visible in the formula used for temperature calculation, which has the
      form "Calibration_Value - ADC_Value" rather than "ADC_Value - Calibration_Value".

      True on STM32F1 and STM32F2 series ("V25 - Vsense").
      True on STM32F030 and STM32F070 lines ("TS_CAL1 - Sense_DATA").
